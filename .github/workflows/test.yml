---
name: test

on:
  push:
    branches-ignore: [debian]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.redmine }} on ${{ matrix.ruby }}
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - ruby: "3.4"
            redmine: "6.1.2"
          - ruby: "3.3"
            redmine: "6.1.2"
          - ruby: "3.2"
            redmine: "6.1.2"
          - ruby: "3.3"
            redmine: "6.0.9"
          - ruby: "3.2"
            redmine: "6.0.9"
          - ruby: "3.1"
            redmine: "6.0.9"
          - ruby: "3.2"
            redmine: "5.1.12"
          - ruby: "3.1"
            redmine: "5.1.12"
          - ruby: "3.0"
            redmine: "5.1.12"
      fail-fast: false

    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 10
      BUNDLE_WITHOUT: development
      REDMINE_VERSION: ${{ matrix.redmine }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: setup postgres
        run: |
          sudo systemctl start postgresql
          sudo -u postgres createuser -s ${USER}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: True

      - name: setup cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: v5-ruby-${{ matrix.ruby }}-redmine-${{ matrix.redmine }}

      - name: install dependencies
        run: sudo apt-get install --quiet --yes subversion

      - name: setup redmine ${{ matrix.redmine }}
        run: ./redmine update

      - name: run tests
        run: ./redmine exec bundle exec rspec --force-color --format doc

  rubocop:
    runs-on: ubuntu-24.04

    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"
          bundler-cache: True

      - run: bundle exec rubocop --fail-level E --extra-details --display-time --color

  editorconfig:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # main
      - run: editorconfig-checker

  spellcheck:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8

  format:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun run lint:format

  stylelint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun run lint:css
